version: '3.8'

services:
  crawler:
    build:
      context: ./crawler
      dockerfile: Dockerfile
    container_name: ai-news-crawler
    ports:
      - "30852:8000"
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
